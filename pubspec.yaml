name: cabxigo
description: A modern Flutter taxi booking application.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_maps_flutter: ^2.5.0
  google_maps_flutter_platform_interface: ^2.4.0
  google_places_flutter: ^2.0.8
  geolocator: ^9.0.2
  geocoding: ^2.1.1
  intl: ^0.19.0
  provider: ^6.1.0
  get: ^4.6.6
  dotted_line: ^3.0.0
  flutter_svg: ^2.0.7
  lottie: ^2.4.0
  http: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_linter: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
